name: Build site from cars.json

on:
  push:
    branches: [main]
    paths:
      - cars.json
      - build.py

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run build script
        run: python3 build.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: rebuild catalog from cars.json [skip ci]"
          git push

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TEXT="✅ *VR Cars actualizado*%0ALa web ya está publicada en https://vrcarsoficial.com"
          else
            TEXT="❌ *Error en el deploy de VR Cars*%0ARevisa GitHub Actions para más detalles."
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=2539761&text=${TEXT}&parse_mode=Markdown&disable_web_page_preview=true"
