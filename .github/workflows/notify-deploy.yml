name: Notify Telegram on Pages deploy

on:
  deployment_status:

jobs:
  notify:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=2539761&text=🌐 *VR Cars publicado*%0Ahttps://vrcarsoficial.com ya está actualizado.&parse_mode=Markdown&disable_web_page_preview=true"
